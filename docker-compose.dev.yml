services:
  db:
    ports:
      - "5432:5432"

  backend:
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - image_data:/app/images
    ports:
      - "8000:8000"

  frontend:
    user: "${UID:-1000}:${GID:-1000}"
    command: ["npm", "run", "dev", "--", "--configLoader", "runner", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  backend_venv:
  frontend_node_modules:
